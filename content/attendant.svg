<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 88" width="120" height="220">
  <!-- 胴体（スーツ）: 頭部より先に描いて頭部が前面に来るように -->
  <rect id="attendant-body" x="4" y="44" width="40" height="44" rx="2" fill="#2c3e6b"/>
  <!-- 白シャツ -->
  <rect id="attendant-shirt" x="20" y="44" width="8" height="44" fill="white"/>
  <!-- ネクタイ -->
  <rect id="attendant-tie" x="21.5" y="46" width="5" height="22" rx="2" fill="#e05050"/>
  <!-- 頭部: 後から描いて前面に重なる -->
  <circle id="attendant-head" cx="24" cy="24" r="22" fill="#FDDBB4" stroke="#c9956a" stroke-width="2"/>
  <!-- 左目 -->
  <ellipse id="attendant-left-eye" cx="14" cy="19" rx="2.5" ry="2.5" fill="#333">
    <animate attributeName="ry" values="2.5;2.5;0.2;2.5;2.5" keyTimes="0;0.88;0.92;0.96;1" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <!-- 右目 -->
  <ellipse id="attendant-right-eye" cx="34" cy="19" rx="2.5" ry="2.5" fill="#333">
    <animate attributeName="ry" values="2.5;2.5;0.2;2.5;2.5" keyTimes="0;0.88;0.92;0.96;1" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <!-- 口 -->
  <path id="attendant-mouth" d="M 17,32 Q 24,39 31,32" stroke="#c06060" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
